  h2 { font-size: 1.2rem; color: #7affdf; letter-spacing: 2px; margin-bottom: 2rem; }

  .btn { background: transparent; border: 2px solid #00ffcc; color: #00ffcc; font-family: 'Courier New', monospace; font-size: 1rem; padding: 0.7rem 2rem; margin: 0.4rem; cursor: pointer; letter-spacing: 2px; transition: all 0.2s; }

// ─── GAME STATE ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const flash = document.getElementById('flash');

let W, H;
function resize() {
  W = canvas.width  = Math.min(window.innerWidth,  900);
  H = canvas.height = Math.min(window.innerHeight, 700);
}
resize();
window.addEventListener('resize', resize);

let state = 'menu';
let score, lives, level, combo;
let aliens = [], bullets = [], particles = [];
let ship;
let currentQ, activeTopics, pool;
let highScore = parseInt(localStorage.getItem('hs_viva2mod2') || '0');
let scoreHistory = JSON.parse(localStorage.getItem('sh_viva2mod2') || '[]');

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); fireBullet(); }
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ─── TOPIC TOGGLES ──────────────────────────────────────────────────────────────
const topicButtons = document.querySelectorAll('.topic-btn');
let selectedTopics = new Set(['mod21','mod22','mod23','mod24','mod25','palabras']);
topicButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.topic;
    if (selectedTopics.has(t)) {
      if (selectedTopics.size > 1) { selectedTopics.delete(t); btn.classList.remove('active'); }
    } else {
      selectedTopics.add(t); btn.classList.add('active');
    }
  });
});

// ─── QUESTION LOGIC ─────────────────────────────────────────────────────────────
function buildPool() {
  pool = [];
  selectedTopics.forEach(t => pool.push(...(vocab[t] || [])));
  for (let i = pool.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
}

function newQuestion() {
  if (!pool.length) buildPool();
  const item = pool.splice(0,1)[0];
  const esFirst = Math.random() < 0.5;
  currentQ = {
    prompt: esFirst ? item.en : item.es,
    answer: esFirst ? item.es : item.en,
    isEsPrompt: !esFirst
  };
  return currentQ;
}

function getWrongAnswers(correct, count) {
  const all = [];
  selectedTopics.forEach(t => all.push(...vocab[t]));
  const esFirst = !currentQ.isEsPrompt;
  const candidates = all.map(v => esFirst ? v.es : v.en).filter(v => v !== correct);
  const shuffled = candidates.sort(() => Math.random()-0.5);
  return shuffled.slice(0, count);
}

// ─── SHIP ───────────────────────────────────────────────────────────────────────
function initShip() {
  ship = { x: W/2, y: H - 50, w: 40, h: 30, spd: 12, shooting: false };
}

function fireBullet() {
  if (state !== 'playing') return;
  bullets.push({ x: ship.x, y: ship.y - 15, spd: 14, active: true });
}

// ─── ALIENS ─────────────────────────────────────────────────────────────────────
const ALIEN_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f1c'];
const ALIEN_EMOJIS = ['👾','🛸','🤖','👽','🔮','💀'];

// Measure text to size the alien capsule dynamically
function measureLabel(label) {
  ctx.font = 'bold 14px Courier New';
  const lines = wrapLabel(label, 160);
  const w = Math.max(...lines.map(l => ctx.measureText(l).width)) + 28;
  const h = lines.length > 1 ? 62 : 50;
  return { w: Math.max(w, 80), h };
}

function wrapLabel(label, maxPx) {
  ctx.font = 'bold 14px Courier New';
  const words = label.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxPx && cur) {
      lines.push(cur);
      cur = w;
    } else {
      cur = test;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

function spawnAlienWave() {
  const q = newQuestion();
  const wrongAnswers = getWrongAnswers(q.answer, Math.min(3 + Math.floor(level/3), 5));
  const allAnswers = [q.answer, ...wrongAnswers].sort(() => Math.random()-0.5);

  const count = allAnswers.length;
  const spacing = W / (count + 1);
  const startY = -70;
  const spd = 0.5 + level * 0.18;

  allAnswers.forEach((ans, i) => {
    const dims = measureLabel(ans);
    aliens.push({
      x: spacing * (i + 1),
      y: startY - i * 18,
      w: dims.w, h: dims.h,
      label: ans,
      isCorrect: ans === q.answer,
      spd,
      color: ALIEN_COLORS[i % ALIEN_COLORS.length],
      emoji: ALIEN_EMOJIS[i % ALIEN_EMOJIS.length],
      hit: false,
      wobble: Math.random() * Math.PI * 2
    });
  });
}

// ─── PARTICLES ──────────────────────────────────────────────────────────────────
function explode(x, y, color, count=14) {
  for (let i=0; i<count; i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const spd = 2 + Math.random()*4;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 1, color, size: 3+Math.random()*4 });
  }
}

function doFlash(color) {
  flash.style.background = color;
  flash.style.opacity = '0.35';
  setTimeout(()=>{ flash.style.opacity='0'; }, 150);
}

// ─── DRAW ───────────────────────────────────────────────────────────────────────
function drawStars() {
  if (!drawStars.stars) {
    drawStars.stars = Array.from({length:80}, ()=>({ x:Math.random()*900, y:Math.random()*700, r:Math.random()*1.5, b:Math.random() }));
  }
  drawStars.stars.forEach(s => {
    ctx.globalAlpha = 0.4 + 0.6*Math.abs(Math.sin(Date.now()/2000 + s.b*10));
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawShip() {
  const x = ship.x, y = ship.y;
  ctx.fillStyle = '#00ffcc';
  ctx.beginPath();
  ctx.moveTo(x, y - 20);
  ctx.lineTo(x - 18, y + 12);
  ctx.lineTo(x + 18, y + 12);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#7affdf';
  ctx.fillRect(x - 3, y - 28, 6, 14);
  ctx.fillStyle = '#00ccaa';
  ctx.beginPath();
  ctx.moveTo(x - 18, y + 12); ctx.lineTo(x - 30, y + 20); ctx.lineTo(x - 10, y + 12);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 18, y + 12); ctx.lineTo(x + 30, y + 20); ctx.lineTo(x + 10, y + 12);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,204,0.18)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,6]);
  ctx.beginPath(); ctx.moveTo(x, y - 28); ctx.lineTo(x, 0); ctx.stroke();
  ctx.setLineDash([]);
}

function drawAlien(a) {
  a.wobble += 0.04;
  const wx = Math.sin(a.wobble) * 3;
  const x = a.x + wx, y = a.y;

  // Glow
  ctx.shadowColor = a.color;
  ctx.shadowBlur = 14;
  ctx.fillStyle = a.color + '33';
  ctx.beginPath();
  ctx.ellipse(x, y, a.w/2+8, a.h/2+8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Body
  ctx.fillStyle = a.color + '55';
  ctx.strokeStyle = a.color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(x, y, a.w/2, a.h/2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();

  // Emoji
  ctx.font = '16px serif';
  ctx.textAlign = 'center';
  ctx.fillText(a.emoji, x, y - a.h/2 + 18);

  // Label — bigger font, wrapping
  const lines = wrapLabel(a.label, a.w - 16);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Courier New';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 4;
  if (lines.length === 1) {
    ctx.fillText(lines[0], x, y + 6);
  } else {
    const lineH = 17;
    const totalH = lines.length * lineH;
    const startY = y - totalH/2 + lineH;
    lines.forEach((ln, idx) => ctx.fillText(ln, x, startY + idx * lineH));
  }
  ctx.shadowBlur = 0;
}

function drawBullet(b) {
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.ellipse(b.x, b.y, 3, 8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawHUD() {
  ctx.fillStyle = '#00ffcc';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 12, 24);

  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level}`, W/2, 24);

  ctx.fillStyle = '#7affdf';
  ctx.textAlign = 'right';
  ctx.fillText(`HI: ${highScore}`, W-12, 24);

  for (let i=0; i<lives; i++) {
    ctx.fillStyle = '#ff4466';
    ctx.font = '18px serif';
    ctx.fillText('♥', W-12 - i*24, 48);
  }

  // Question prompt — larger and clearly visible
  const prompt = currentQ ? currentQ.prompt : '';
  ctx.font = 'bold 19px Courier New';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#fff';
  ctx.fillText(`➤  ${prompt}`, W/2, H - 18);
  ctx.shadowBlur = 0;

  if (combo >= 3) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(`🔥 COMBO x${combo}`, 12, 48);
  }
}

// ─── UPDATE ─────────────────────────────────────────────────────────────────────
function update(dt) {
  if (keys['ArrowLeft'] || keys['KeyA']) ship.x = Math.max(20, ship.x - ship.spd);
  if (keys['ArrowRight'] || keys['KeyD']) ship.x = Math.min(W-20, ship.x + ship.spd);

  bullets.forEach(b => { b.y -= b.spd; });
  bullets = bullets.filter(b => b.y > 0);

  aliens.forEach(a => { a.y += a.spd; });

  bullets.forEach(b => {
    if (!b.active) return;
    aliens.forEach(a => {
      if (a.hit) return;
      if (Math.abs(b.x - a.x) < a.w/2 && Math.abs(b.y - a.y) < a.h/2) {
        b.active = false;
        a.hit = true;
        if (a.isCorrect) {
          combo++;
          const bonus = combo >= 3 ? 5 : 0;
          score += 10 + bonus + level;
          explode(a.x, a.y, '#00ffcc', 18);
          doFlash('#00ffcc');
          aliens.forEach(o => { if (!o.isCorrect) o.hit = true; });
          setTimeout(() => spawnAlienWave(), 400);
        } else {
          combo = 0;
          lives--;
          explode(a.x, a.y, '#ff4466', 12);
          doFlash('#ff4466');
          if (lives <= 0) endGame();
        }
      }
    });
  });
  bullets = bullets.filter(b => b.active);

  aliens.forEach(a => {
    if (!a.hit && a.y > H + 40) {
      if (a.isCorrect) {
        a.hit = true;
        combo = 0;
        lives--;
        doFlash('#ff4466');
        aliens.forEach(o => { if (!o.isCorrect) o.hit = true; });
        if (lives <= 0) { endGame(); return; }
        setTimeout(() => spawnAlienWave(), 400);
      } else {
        a.hit = true;
      }
    }
  });
  aliens = aliens.filter(a => !a.hit);

  const nextLevel = Math.floor(score / 80) + 1;
  if (nextLevel > level) { level = nextLevel; }

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.035;
  });
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ─── LOOP ───────────────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  if (state === 'playing') {
    ctx.clearRect(0,0,W,H);
    drawStars();
    drawShip();
    aliens.forEach(drawAlien);
    bullets.forEach(drawBullet);
    drawParticles();
    drawHUD();
    update(dt);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── GAME CONTROL ───────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; level = 1; combo = 0;
  aliens = []; bullets = []; particles = [];
  buildPool();
  initShip();
  spawnAlienWave();
  state = 'playing';
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
}

function endGame() {
  state = 'gameover';
  const isNewHS = score > highScore;
  if (isNewHS) { highScore = score; localStorage.setItem('hs_viva2mod2', highScore); }

  scoreHistory.unshift({ score, level, date: new Date().toLocaleDateString('en-AU') });
  if (scoreHistory.length > 8) scoreHistory = scoreHistory.slice(0,8);
  localStorage.setItem('sh_viva2mod2', JSON.stringify(scoreHistory));

  document.getElementById('final-score').textContent = `SCORE: ${score}`;
  document.getElementById('final-level').textContent = `Reached Level ${level}`;
  document.getElementById('new-hs').style.display = isNewHS ? 'block' : 'none';
  renderHistory('score-history-go');
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function renderHistory(id) {
  const el = document.getElementById(id);
  if (!scoreHistory.length) { el.textContent = ''; return; }
  el.innerHTML = '<span style="color:#aaa">— SCORE HISTORY —</span><br>' +
    scoreHistory.map((s,i) => `${i+1}. ${s.date} &nbsp; Score: ${s.score} &nbsp; Lv ${s.level}`).join('<br>');
}

function showMenu() {
  state = 'menu';
  document.getElementById('highscore-display').textContent = `🏆 HIGH SCORE: ${highScore}`;
  renderHistory('score-history');
  document.getElementById('menu-screen').classList.remove('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('play-again-btn').addEventListener('click', startGame);
document.getElementById('menu-btn').addEventListener('click', showMenu);

// Mobile touch
let touchX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchX = e.touches[0].clientX;
  fireBullet();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const dx = e.touches[0].clientX - touchX;
  ship.x = Math.max(20, Math.min(W-20, ship.x + dx));
  touchX = e.touches[0].clientX;
}, {passive:false});

showMenu();
</script>
